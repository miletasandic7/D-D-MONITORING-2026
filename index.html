<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>D&D Global AI Surveillance - Login</title>
    <link href="css2.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('login-background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Change purple to cyan using hue-rotate and color filters */
            filter: hue-rotate(180deg) saturate(1.5) brightness(1.1);
            z-index: 1;
        }

        /* Overlay to enhance cyan theme */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header-text {
            margin-bottom: 60px;
        }

        .security-dashboard {
            font-size: 48px;
            font-weight: 700;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .monitoring {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .login-form {
            background: linear-gradient(135deg, rgba(13, 13, 21, 0.95) 0%, rgba(26, 26, 46, 0.95) 100%);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #00ffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #00ffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0a0a12 0%, #151520 100%);
            border: 2px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
            border: none;
            border-radius: 8px;
            color: #0a0a0f;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .login-button:hover {
            background: linear-gradient(135deg, #00cccc 0%, #00ffff 100%);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .threat-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
        }

        .threat-icon {
            font-size: 24px;
        }

        .threat-text {
            font-size: 14px;
            color: #ff4444;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .security-dashboard {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .monitoring {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .login-form {
                padding: 30px 20px;
            }

            .content-wrapper {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="background-image"></div>
        <div class="background-overlay"></div>
        
        <div class="content-wrapper">
            <div class="header-text">
                <div class="security-dashboard">SECURITY DASHBOARD</div>
                <div class="monitoring">MONITORING</div>
            </div>

            <div class="login-form">
                <div class="form-title">System Access</div>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="login-button">ENTER DASHBOARD</button>
                </form>

                <div class="threat-indicator">
                    <div class="threat-icon">⚠️</div>
                    <div class="threat-text">Threat Escalation: Active Monitoring</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // Redirect to main dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
