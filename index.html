<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>D&D Global AI Surveillance - Login</title>
    <link href="css2.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #121214;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('login-background.jpg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Change purple to deep cyber-blue using hue-rotate and color filters */
            filter: hue-rotate(220deg) saturate(1.2) brightness(0.85);
            z-index: 1;
        }

        /* Overlay to enhance dark theme */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header-text {
            margin-bottom: 60px;
        }

        .security-dashboard {
            font-size: 36px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .monitoring {
            font-size: 24px;
            font-weight: 500;
            color: #9CA3AF;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .login-form {
            background-color: rgba(26, 29, 36, 0.95);
            border: 1px solid #2D3748;
            border-radius: 8px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #1A1D24;
            border: 1px solid #2D3748;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4A5568;
        }

        .form-group input::placeholder {
            color: #6B7280;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background-color: #1A1D24;
            border: 1px solid #2D3748;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-button:hover {
            border-color: #4A5568;
            background-color: #0A0C10;
        }

        .login-button:active {
            transform: translateY(0);
        }

        .threat-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            padding: 12px;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
        }

        .threat-icon {
            font-size: 20px;
        }

        .threat-text {
            font-size: 12px;
            color: #EF4444;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .security-dashboard {
                font-size: 32px;
                letter-spacing: 2px;
            }

            .monitoring {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .login-form {
                padding: 30px 20px;
            }

            .content-wrapper {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="background-image"></div>
        <div class="background-overlay"></div>
        
        <div class="content-wrapper">
            <div class="header-text">
                <div class="security-dashboard">SECURITY DASHBOARD</div>
                <div class="monitoring">MONITORING</div>
            </div>

            <div class="login-form">
                <div class="form-title">System Access</div>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="login-button">ENTER DASHBOARD</button>
                </form>

                <div class="threat-indicator">
                    <div class="threat-icon">⚠️</div>
                    <div class="threat-text">Threat Escalation: Active Monitoring</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Initialize Supabase client
        const supabaseUrl = 'https://qskedgnkckgmwwxtduqt.supabase.co';
        const supabaseKey = 'sb_publishable_UA7h7UDvMyjrkUjlNcWh3A_nrK3PGuF';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                // Use official Supabase authentication method
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    // Authentication failed
                    alert('Invalid Credentials');
                    return;
                }
                
                if (data.user) {
                    // Authentication successful
                    // Get user role from users table
                    const { data: userData, error: userError } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', email)
                        .single();
                    
                    if (userError || !userData) {
                        alert('User profile not found');
                        await supabase.auth.signOut();
                        return;
                    }
                    
                    // Store user info in localStorage for dashboard use
                    localStorage.setItem('currentUser', JSON.stringify({
                        email: userData.email,
                        role: userData.role,
                        name: userData.name
                    }));
                    
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Invalid Credentials');
            }
        }
    </script>
</body>
</html>
